<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repertoire Excerpts</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 640px;
      margin: 4rem auto;
      padding: 0 1.5rem;
      color: #222;
      background: #fafafa;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: normal;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 1px solid #ccc;
      padding-bottom: 0.5rem;
      margin-bottom: 2rem;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li {
      margin-bottom: 1rem;
    }
    a {
      color: #222;
      text-decoration: none;
      border-bottom: 1px solid #aaa;
    }
    a:hover {
      color: #555;
      border-bottom-color: #555;
    }
    .composer {
      font-style: normal;
    }
    .piece {
      font-style: italic;
    }
    .year {
      color: #777;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <h1>Orchestration Excerpts</h1>
  <h5><em>Click below to access annotated PDF scores for repertoire discussed in today’s class.</em></h5>
  <ul id="list"></ul>

  <script>
    // Edit entries here: { file, composer, piece, year }
    const excerpts = [
      {
        file: "Verdi_LaTraviata_None.pdf",
        composer: "Giuseppe Verdi",
        piece: "La Traviata (The Fallen Woman), Act I. No. 1. Preludio",
        year: "1853"
      },
      {
        file: "Ravel_AlboradaDelGracioso_692feabc8bf748828ee2ae7cd1569e99.pdf",
        composer: "Maurice Ravel",
        piece: "Alborada del Gracioso (Morning Song of the Clown) (mm. 1—11)",
        year: "1905/1919"
      },
      {
        file: "Ravel_AlboradaDelGracioso_m98-103_v01.pdf",
        composer: "Maurice Ravel",
        piece: "Alborada del Gracioso (Morning Song of the Clown) (mm. 98—103)",
        year: "1905/1919"
      },
      {
        file: "Ravel_LEnfant_et_les_Sortilèges_(1919–25)_p1-2.pdf",
        composer: "Maurice Ravel",
        piece: "L'Enfant et les Sortilèges (The Child and the Magic Spells) (pp. 1—2)",
        year: "1919-1925"
      },


      


    ];


    const list = document.getElementById("list");
    excerpts.forEach(({ file, composer, piece, year }) => {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = file;
      a.target = "_blank";

      const parts = [];
      if (composer) parts.push(`<span class="composer">${composer}</span>`);
      if (piece)    parts.push(`<span class="piece">${piece}</span>`);
      if (year)     parts.push(`<span class="year">(${year})</span>`);
      a.innerHTML = parts.join(", ");

      li.appendChild(a);
      list.appendChild(li);
    });
  </script>
</body>
</html>
